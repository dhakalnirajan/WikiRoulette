name: Deploy WikiRoulette to GitHub Pages

on:
  # Trigger on pushes to the main branch
  push:
    branches:
      - main
  # Allow manual triggers from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Using LTS version compatible with Vite 5
          cache: "npm" # Caches node_modules for faster installs

      - name: Install Dependencies
        run: npm ci # Clean install based on package-lock.json

      - name: Build Project
        # This is the critical step. If this fails, the job stops here.
        # The previous successful deployment on GitHub Pages remains active.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the 'dist' directory generated by Vite
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
